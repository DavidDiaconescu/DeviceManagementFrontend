<div class="container">
  <h2 class="mb-3">Users</h2>

  <table class="table table-bordered table-hover">
    <thead class="thead-dark">
      <tr>
        <th>Name</th>
        <th>Role</th>
        <th>Location</th>
        @if (isAdmin) {
          <th>Actions</th>
        }
      </tr>
    </thead>
    <tbody>
      @for (user of users; track user.id) {
        <tr>
          <td>{{ user.name }}</td>
          <td>{{ user.role }}</td>
          <td>{{ user.location }}</td>
          @if (isAdmin) {
            <td>
              <button class="btn btn-sm btn-danger" (click)="deleteUser(user.id)">Delete</button>
            </td>
          }
        </tr>
      } @empty {
        <tr>
          <td [attr.colspan]="isAdmin ? 4 : 3" class="text-center">No users found.</td>
        </tr>
      }
    </tbody>
  </table>
</div>
